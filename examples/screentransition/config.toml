volume = 0.6

[logic]
p1 = 1.5  # detach_speed
p2 = 0.3  # move_distance
p3 = 0.5  # rotation_speed
p4 = 0.3  # perspective

[features]
f1 = true  # enable_3d
f2 = true  # enable_sound

[[sequence]]
name = "capture"
duration_ms = 500
shader_entry = "fs_capture"
sound = "woosh.wav"

[[sequence]]
name = "detach"
duration_ms = 1500
shader_entry = "fs_detach"
sound = "woosh.wav"

[[sequence]]
name = "move"
duration_ms = 2000
shader_entry = "fs_move"
sound = "pulse.wav"

[[sequence]]
name = "land"
duration_ms = 1000
shader_entry = "fs_land"
sound = "pulse.wav"

[[sequence]]
name = "stable"
duration_ms = 0
shader_entry = "fs_stable"